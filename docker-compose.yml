version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: EV-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: EV-backend
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-app}
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - VALHALLA_URL=${VALHALLA_URL:-http://valhalla:8002}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: EV-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
      - VITE_VALHALLA_URL=${VITE_VALHALLA_URL:-http://localhost:8002}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    networks:
      - app-network

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: EV-valhalla
    ports:
      - "8002:8002"
    environment:
      - tile_dir=/custom_files/valhalla_tiles
      - build_elevation=false
      - build_admins=true
      - build_time_zones=false
      - min_lon=-180
      - min_lat=-90
      - max_lon=180
      - max_lat=90
      - tile_urls=https://download.geofabrik.de/asia/nepal-latest.osm.pbf
    volumes:
      - valhalla_tiles:/custom_files
    networks:
      - app-network

volumes:
  postgres_data:
  valhalla_tiles:

networks:
  app-network:
    driver: bridge
